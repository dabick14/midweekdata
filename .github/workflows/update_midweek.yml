name: Update Midweek Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 6'

permissions:
  contents: write
  id-token: write # REQUIRED: This allows the "handshake" with Google Cloud

jobs:
  update-midweek-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. NEW: Authenticate to Google Cloud using the WIF Pool we just built
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/355623912921/locations/global/workloadIdentityPools/github-pool-v3/providers/github-provider'
          service_account: 'github-deployer@psychic-nuance-495210-f1.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl google-api-python-client google-auth

      - name: Run updater script
        env:
          FLC_EMAIL: ${{ secrets.FLC_EMAIL }}
          FLC_PASSWORD: ${{ secrets.FLC_PASSWORD }}
          STREAM_ID_1: ${{ secrets.STREAM_ID_1 }}
          STREAM_ID_2: ${{ secrets.STREAM_ID_2 }}
          STREAM_ID_3: ${{ secrets.STREAM_ID_3 }}
        run: python update_midweek_data.py --input Midweek_Data.xlsx --output Midweek_Data_updated.xlsx

      - name: Create dated workbook copy
        if: ${{ hashFiles('Midweek_Data_updated.xlsx') != '' }}
        run: |
          DATED_FILE="Midweek_Data_$(date -u +%F).xlsx"
          cp Midweek_Data_updated.xlsx "$DATED_FILE"
          echo "DATED_FILE=$DATED_FILE" >> "$GITHUB_ENV"

      - name: Debug Google Drive visibility
        if: ${{ hashFiles('Midweek_Data_updated.xlsx') != '' }}
        run: |
          python - <<'PY'
          import google.auth
          from googleapiclient.discovery import build

          credentials, _ = google.auth.default(
            scopes=["https://www.googleapis.com/auth/drive.readonly"]
          )
          service = build("drive", "v3", credentials=credentials)

          drives = service.drives().list(pageSize=20).execute().get("drives", [])
          print(f"Visible shared drives: {len(drives)}")
          for d in drives[:10]:
            print(f"DRIVE id={d.get('id')} name={d.get('name')}")

          items = (
            service.files()
            .list(
              pageSize=20,
              fields="files(id,name,mimeType,driveId)",
              supportsAllDrives=True,
              includeItemsFromAllDrives=True,
              corpora="allDrives",
            )
            .execute()
            .get("files", [])
          )
          print(f"Visible files/folders sample: {len(items)}")
          for f in items[:10]:
            print(
              f"FILE id={f.get('id')} name={f.get('name')} "
              f"type={f.get('mimeType')} driveId={f.get('driveId')}"
            )
          PY

      - name: Upload dated workbook to Google Drive
        if: ${{ hashFiles('Midweek_Data_updated.xlsx') != '' }}
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          DATED_FILE: ${{ env.DATED_FILE }}
        run: |
          python - <<'PY'
          import os
          import google.auth
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from googleapiclient.errors import HttpError

          # 2. UPDATED: No more JSON loading. We use "default()" credentials.
          folder_id = os.environ.get("GOOGLE_DRIVE_FOLDER_ID", "").strip()
          file_name = os.environ["DATED_FILE"]

          if not folder_id:
            raise RuntimeError(
              "GOOGLE_DRIVE_FOLDER_ID is empty. Set the repository secret GOOGLE_DRIVE_FOLDER_ID."
            )

          # This automatically finds the token from the "auth" step above
          credentials, project = google.auth.default(
              scopes=["https://www.googleapis.com/auth/drive"]
          )
          
          service = build("drive", "v3", credentials=credentials)

          # Check folder accessibility first so failures are clearer.
          try:
            service.files().get(
              fileId=folder_id,
              fields="id,name,driveId",
              supportsAllDrives=True,
            ).execute()
          except HttpError as exc:
            raise RuntimeError(
              "Cannot access GOOGLE_DRIVE_FOLDER_ID with current GitHub auth service account. "
              "Confirm folder id is correct and shared with the auth service account."
            ) from exc

          metadata = {
              "name": file_name,
              "parents": [folder_id],
          }
          media = MediaFileUpload(
              file_name,
              mimetype="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
          )
          created = (
              service.files()
              .create(
                  body=metadata,
                  media_body=media,
                  fields="id,name",
                  supportsAllDrives=True,
              )
              .execute()
          )
          print(f"Uploaded {created['name']} to Google Drive with file id {created['id']}")
          PY

      - name: Replace source workbook with updated workbook
        run: |
          if [ -f Midweek_Data_updated.xlsx ]; then
            mv Midweek_Data_updated.xlsx Midweek_Data.xlsx
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Midweek_Data.xlsx
          if git diff --cached --quiet; then
            echo "No workbook changes to commit"
            exit 0
          fi
          git commit -m "chore: update midweek data workbook"
          git push